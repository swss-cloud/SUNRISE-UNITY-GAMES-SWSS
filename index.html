<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUNRISE UNITY GAMES SWSS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700;900&display=swap');
        body {
            font-family: 'Kanit', sans-serif;
            /* 🔓 เอาตัวคลุมสีเข้มออกแล้ว เหลือเพียงภาพพื้นหลัง bg.png แบบดั้งเดิมสว่างคมชัดเต็มร้อย */
            background-image: url('bg.png'), url('bg.jpg'), url('bg.jpeg'), url('bg.webp');
            background-size: cover; 
            background-repeat: no-repeat;
            background-attachment: fixed; 
            background-position: center;
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen">

    <div class="container mx-auto px-4 py-8 max-w-6xl">
        
        <header class="text-center mb-12 mt-4 select-none">
            <h1 class="text-5xl sm:text-6xl font-black text-[#93c5fd] tracking-wider uppercase drop-shadow-[0_5px_0_#020617] filter drop-shadow-[0_0_25px_rgba(147,197,253,0.5)]">
                SUNRISE UNITY GAMES SWSS
            </h1>
            <div class="mt-4 inline-block">
                <p class="text-[#fef08a] font-black tracking-widest text-xs sm:text-sm uppercase bg-slate-950/95 border-2 border-[#fef08a] rounded-full px-6 py-2 shadow-[0_0_20px_rgba(0,0,0,0.8)] backdrop-blur-md">
                    ⚡ AI PHYSICAL FITNESS TEST SYSTEM (JUMPING JACKS) ⚡
                </p>
            </div>
        </header>

        <div id="setup-section" class="max-w-md mx-auto bg-slate-950 border-2 border-[#818cf8] rounded-2xl p-8 shadow-[0_0_40px_rgba(0,0,0,0.7)] backdrop-blur-xl">
            <h2 class="text-2xl font-black mb-6 text-center text-[#fef08a] border-b-2 border-slate-900 pb-3 tracking-wide drop-shadow-[0_2px_2px_rgba(0,0,0,1)]">
                📋 ข้อมูลผู้เข้าทดสอบ
            </h2>
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-black text-[#a5b4fc] mb-1.5 uppercase tracking-wide drop-shadow-[0_1px_2px_rgba(0,0,0,1)]">ชื่อ-นามสกุล</label>
                    <input type="text" id="user-name" placeholder="เช่น ด.ช.สมชาย ดีใจ" class="w-full bg-slate-900 border-2 border-slate-800 focus:border-[#fef08a] rounded-xl px-4 py-3 text-white focus:outline-none font-bold transition text-lg shadow-inner">
                </div>
                <div>
                    <label class="block text-sm font-black text-[#a5b4fc] mb-1.5 uppercase tracking-wide drop-shadow-[0_1px_2px_rgba(0,0,0,1)]">ชั้นเรียน / ห้อง</label>
                    <input type="text" id="user-class" placeholder="เช่น ม.3/1" class="w-full bg-slate-900 border-2 border-slate-800 focus:border-[#fef08a] rounded-xl px-4 py-3 text-white focus:outline-none font-bold transition text-lg shadow-inner">
                </div>
                <div>
                    <label class="block text-sm font-black text-[#a5b4fc] mb-1.5 uppercase tracking-wide drop-shadow-[0_1px_2px_rgba(0,0,0,1)]">สีประจำกลุ่ม / สีเสือ</label>
                    <select id="user-color" class="w-full bg-slate-900 border-2 border-slate-800 focus:border-[#fef08a] rounded-xl px-4 py-3 text-white focus:outline-none font-bold transition text-lg cursor-pointer">
                        <option value="purple">สีม่วง 🟣 (SHARK)</option>
                        <option value="orange">สีส้ม 🟠 (TIGER)</option>
                        <option value="pink">สีชมพู 🌸 (EAGLE)</option>
                    </select>
                </div>
                <button onclick="startApp()" class="w-full mt-4 bg-[#818cf8] hover:bg-[#6366f1] text-slate-950 font-black py-4 px-4 rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.5)] transform active:scale-95 transition cursor-pointer text-xl tracking-wider uppercase">
                    เข้าสู่หน้าทดสอบ
                </button>
            </div>
        </div>

        <div id="main-section" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-8 animate-fadeIn">
            
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-slate-950 border-2 border-slate-800 backdrop-blur-lg rounded-3xl p-6 shadow-2xl">
                    <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
                        <div>
                            <span id="current-user-badge" class="bg-black text-[#fef08a] text-sm font-black px-4 py-2.5 rounded-xl border border-slate-800 shadow-inner tracking-wide">
                                ผู้ทดสอบ: -
                            </span>
                        </div>
                        <div class="bg-slate-900 px-4 py-2.5 border border-slate-800 rounded-xl text-sm font-black text-[#818cf8] shadow-inner">
                            🤸‍♂️ MOTION DETECTION ACTIVE
                        </div>
                    </div>

                    <div class="relative bg-black rounded-2xl overflow-hidden aspect-video border-4 border-slate-900 shadow-2xl flex items-center justify-center">
                        <video id="webcam" class="hidden" autoplay playsinline></video>
                        <canvas id="output_canvas" class="w-full h-full object-cover transform -scale-x-100"></canvas>
                        
                        <div id="countdown-overlay" class="hidden absolute inset-0 bg-slate-950/95 items-center justify-center text-9xl font-black text-[#fef08a] animate-bounce">
                            3
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-4 mt-6 text-center">
                        <div class="bg-slate-900 border-2 border-slate-800 p-4 rounded-2xl shadow-xl">
                            <p class="text-xs text-[#94a3b8] uppercase tracking-widest font-black">เวลาที่เหลือ</p>
                            <p id="timer" class="text-4xl font-black text-[#fef08a] mt-1 drop-shadow-[0_2px_8px_rgba(254,240,138,0.3)]">20s</p>
                        </div>
                        <div class="bg-slate-900 border-2 border-slate-800 p-4 rounded-2xl shadow-xl">
                            <p class="text-xs text-[#94a3b8] uppercase tracking-widest font-black">คะแนนสะสม</p>
                            <p id="score" class="text-4xl font-black text-[#a7f3d0] mt-1 drop-shadow-[0_2px_8px_rgba(167,243,208,0.3)]">0</p>
                        </div>
                        <div class="flex flex-col justify-center gap-2">
                            <button id="btn-start" onclick="startTimer()" class="bg-[#f472b6] hover:bg-[#f43f5e] text-slate-950 font-black py-2.5 px-3 text-base rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.5)] cursor-pointer transition transform active:scale-95 border-b-4 border-[#c084fc] tracking-wide uppercase">
                                ▶️ START (20s)
                            </button>
                            <button id="btn-save" onclick="saveScore()" disabled class="bg-slate-900 text-slate-700 font-bold py-2.5 px-3 text-sm rounded-xl opacity-30 cursor-not-allowed transition border border-slate-800/80">
                                💾 บันทึกคะแนน
                            </button>
                        </div>
                    </div>

                    <div class="mt-4 flex justify-end gap-3">
                        <button id="btn-pdf" onclick="generatePDF()" disabled class="bg-slate-900 text-slate-600 font-black py-2.5 px-4 rounded-xl text-xs opacity-35 cursor-not-allowed transition border border-slate-800 shadow-md">
                            📄 ดาวน์โหลด PDF รายบุคคล
                        </button>
                    </div>
                </div>

                <div class="bg-slate-950 border border-slate-900 backdrop-blur-md rounded-2xl p-6 shadow-2xl">
                    <div class="flex flex-wrap justify-between items-center mb-4 border-b border-slate-900 pb-3 gap-2">
                        <h3 class="text-xl font-bold text-white flex items-center gap-2 tracking-wide">
                            📋 สถิติล่าสุดในระบบเซสชัน
                        </h3>
                        <span id="sheet-status" class="text-xs font-black text-[#cffafe] bg-black px-4 py-1.5 rounded-full border border-slate-800 shadow-inner">📊 ระบบชีตออนไลน์: สแตนด์บาย</span>
                    </div>
                    <div class="overflow-x-auto max-h-60">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-black text-[#a5b4fc] uppercase text-xs border-b border-slate-800 sticky top-0">
                                <tr>
                                    <th class="px-4 py-3">วันที่</th>
                                    <th class="px-4 py-3">ชื่อ / ชั้น</th>
                                    <th class="px-4 py-3">สี</th>
                                    <th class="px-4 py-3">ประเภท</th>
                                    <th class="px-4 py-3 text-right">คะแนน</th>
                                </tr>
                            </thead>
                            <tbody id="history-table-body" class="divide
